<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SBV3-MLB</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background-image: url("https://cdn.discordapp.com/attachments/1517119720623571114/1524348577806291024/images_1.jpg");
background-size: cover;
background-position: center;
background-repeat: no-repeat;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#fff;

}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
opacity:.6;
}

.box{
position:relative;
z-index:5;
text-align:center;
padding:45px;
border-radius:18px;
background:rgba(0,0,0,.75);
overflow:hidden;
}

.box::before{
content:"";
position:absolute;
top:50%;
left:50%;
width:220%;
height:220%;
background:conic-gradient(
transparent,
transparent,
#00bfff,
#66e0ff,
#00bfff,
transparent
);
transform:translate(-50%,-50%);
animation:borderRotate 5s linear infinite;
filter:blur(6px);
z-index:-2;
}

.box::after{
content:"";
position:absolute;
inset:3px;
background:#000;
border-radius:16px;
z-index:-1;
}

@keyframes borderRotate{
100%{
transform:translate(-50%,-50%) rotate(360deg);
}
}

h1{
font-size:58px;
color:#fff;
text-shadow:
0 0 8px #fff,
0 0 18px #fff,
0 0 35px #00bfff;
margin-bottom:15px;
}

p{
font-size:22px;
margin-bottom:35px;
text-shadow:0 0 12px #fff;
}

a{
position:relative;
display:inline-block;
padding:18px 50px;
font-size:24px;
font-weight:bold;
color:#fff;
text-decoration:none;
border:2px solid #00bfff;
border-radius:12px;
overflow:hidden;
box-shadow:
0 0 15px #00bfff,
0 0 30px #00bfff;
transition:.3s;
}

a::before{
content:"";
position:absolute;
top:0;
left:-120%;
width:60%;
height:100%;
background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,.9),
transparent
);
transform:skewX(-20deg);
animation:shine 2s linear infinite;
}

@keyframes shine{
0%{left:-120%;}
100%{left:150%;}
}

a:hover{
background:#00bfff;
color:#000;
box-shadow:
0 0 25px #00bfff,
0 0 60px #00bfff;
transform:scale(1.08);
}
</style>
</head>

<body>

<canvas id="snow"></canvas>

<div class="box">

<h1>SBV3 MLB</h1>

<p>ยินดีต้อนรับเข้าสู่เซิร์ฟเวอร์ SBV3 MLB</p>
  <p class="description">
เซิร์ฟเวอร์ผิดกฎหมาย  ยิงดิส  ค้นที่อยู่ น.ร  ค้นข้อมูลด้วยเลขบัตรปชช  
ยิงเว็บไซต์  ดักกล้องและข้อมูล
  </p>

<a href="https://discord.gg/GU9Kav9hq" target="_blank">
JOIN - SERVER
</a>

</div>

<script>

const canvas=document.getElementById("snow");
const ctx=canvas.getContext("2d");

function resize(){

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

}

resize();

window.addEventListener("resize",()=>{

resize();
init();

});

const letters="010101010101010101010101010101";
const fontSize=19;

let columns;
let drops;

function init(){

columns=Math.floor(canvas.width/fontSize);

drops=[];

for(let i=0;i<columns;i++){

drops[i]=Math.random()*-100;

}

}

init();
function draw(){

ctx.fillStyle="rgba(0,0,0,0.08)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#66ff66";
ctx.shadowColor="#00ff66";
ctx.shadowBlur=10;
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

const text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(
text,
i*fontSize,
drops[i]*fontSize
);

if(
drops[i]*fontSize>canvas.height &&
Math.random()>0.975
){
drops[i]=0;
}

drops[i]++;

}

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
